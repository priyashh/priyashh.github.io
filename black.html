<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Black Hole Simulator (Three.js Multi-Pass)</title>
    <style>
        body { 
            margin: 0; padding: 0; background-color: #000; overflow: hidden;
        }
        canvas { 
            display: block; width: 100vw; height: 100vh;
        }
        /* Tiny HUD overlay purely for polish */
        #hud {
            position: absolute; bottom: 20px; left: 20px; 
            font-family: monospace; color: rgba(255, 255, 255, 0.4); 
            font-size: 11px; z-index: 100;
            pointer-events: none; text-transform: uppercase;
        }
    </style>
    <!-- Importing Three.js API -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    
    <div id="hud">SYSTEM // IN-HOUSE SHADERTOY PIPELINE ENGINE</div>

    <!-- WEBGL PIPELINE SCRIPT -->
    <script>
        // ==========================================
        // 1. SHADERTOY CHUNKS (Copied exactly from Prompt)
        // ==========================================

        const COMMON_TAB = `
            #define ResScale .9

            float hash21(vec2 p) {
                return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
            }

            float noise21(vec2 p) {
                vec2 i = floor(p);
                vec2 f = fract(p);

                vec2 u = f * f * (3. - 2. * f);

                float a = hash21(i + vec2(0., 0.));
                float b = hash21(i + vec2(1., 0.));
                float c = hash21(i + vec2(0., 1.));
                float d = hash21(i + vec2(1., 1.));

                return mix(
                    mix(a, b, u.x),
                    mix(c, d, u.x),
                    u.y
                );
            }

            float fractalNoise21(vec2 p) {
                const int OCTAVES = 5;
                float value = .0;
                float amplitude = .5;
                float frequency = 1.;
                float normalization = 0.;

                for (int i = 0; i < OCTAVES; i++) {
                    value += noise21(p * frequency) * amplitude;
                    normalization += amplitude;
                    frequency *= 2.;
                    amplitude *= .4;
                }

                return value / normalization;
            }

            float hash11(float p){
                return fract(sin(p * 127.1) * 43758.5453123);
            }

            float noise11(float p){
                float i = floor(p);
                float f = fract(p);

                float u = f * f * (3. - 2. * f);

                float a = hash11(i + 0.);
                float b = hash11(i + 1.);

                return mix(a, b, u);
            }

            float fractalNoise1D(float p){
                const int OCTAVES = 5;

                float value = 0.;
                float amplitude = .5;
                float frequency = 1.;
                float normalization = 0.;

                for(int i = 0; i < OCTAVES; i++){
                    value += noise11(p * frequency) * amplitude;
                    normalization += amplitude;

                    frequency *= 2.;
                    amplitude *= .4;
                }

                return value / normalization;
            }

            float hash31(vec3 p) {
                p = fract(p * .1031);
                p += dot(p, p.yzx + 33.33);
                return fract((p.x + p.y) * p.z);
            }

            vec3 hash33(vec3 p) {
                return vec3(
                    hash31(p),
                    hash31(p + 1.),
                    hash31(p + 2.)
                );
            }

            float voronoi(vec3 x) {
                vec3 i = floor(x);
                vec3 f = fract(x);

                float minDist = 1.;

                for (int xo = -1; xo <= 1; xo++)
                for (int yo = -1; yo <= 1; yo++)
                for (int zo = -1; zo <= 1; zo++) {
                    vec3 offset = vec3(xo, yo, zo);
                    vec3 h = hash33(i + offset);
                    vec3 r = offset + h - f;

                    float d = dot(r, r);
                    minDist = min(minDist, d);
                }

                return (minDist); // sqrt
            }

            float noise31(vec3 x) {
                vec3 i = floor(x);
                vec3 f = fract(x);

                // interpolation (Hermite)
                f = f * f * (3. - 2. * f);

                float n000 = hash31(i + vec3(0,0,0));
                float n100 = hash31(i + vec3(1,0,0));
                float n010 = hash31(i + vec3(0,1,0));
                float n110 = hash31(i + vec3(1,1,0));
                float n001 = hash31(i + vec3(0,0,1));
                float n101 = hash31(i + vec3(1,0,1));
                float n011 = hash31(i + vec3(0,1,1));
                float n111 = hash31(i + vec3(1,1,1));

                float n00 = mix(n000, n100, f.x);
                float n10 = mix(n010, n110, f.x);
                float n01 = mix(n001, n101, f.x);
                float n11 = mix(n011, n111, f.x);

                float n0 = mix(n00, n10, f.y);
                float n1 = mix(n01, n11, f.y);

                return mix(n0, n1, f.z);
            }
        `;

        const BUFFER_A_GLSL = `
            #define pi 3.14
            #define rad .2
            #define diskrad 3.
            #define G .3

            // CONTROLS
            #define DENSITY_SCALE 5.0
            #define ABSORPTION_SCALE 3.5
            #define EMISSION_STRENGTH 15.0
            #define EMISSION_FALLOFF 1.5
            #define DISK_THICKNESS 50.0
            #define DISK_BRIGHTNESS 1.0
            #define Spin .15

            #define Zoom 1.

            float invDiskRad = 1.0 / diskrad;

            float swirl(vec3 p, float d) {
                const float TAU = 6.283185;
                float dis = d / diskrad;
                float f = dis * TAU;

                vec2 sc = vec2(sin(f), cos(f));
                float px = p.x * sc.x + p.z * sc.y;
                float py = p.x * sc.y - p.z * sc.x;
                float pz = p.y;

                float lenSq = px*px + py*py + pz*pz;
                float angle = acos(clamp(px * inversesqrt(lenSq), -1., 1.));

                return max(noise11(angle * 2.) - dis + .5, 0.) *noise11(angle * 10.);
            }

            vec3 up = vec3(.1961, .9806, -.0196);
            vec3 forward = vec3(.0, -.019996, -.9998);
            vec3 right = vec3(.9806, -.1960, .00392);

            float dens(vec3 p) {
                float r2 = dot(p, p);
                float cutoff = rad * 3.5;
                float cutoff2 = cutoff * cutoff;

                float mask = smoothstep(cutoff2 * .5, cutoff2, r2);
                if (mask <= .0) return 0.;

                vec3 pos = vec3(
                    dot(p, forward),
                    dot(p, up),
                    dot(p, right)
                );

                float xz2 = dot(pos.xz, pos.xz);
                float y = pos.y * DISK_THICKNESS;
                float d = sqrt(xz2 + y*y);
                float density = max(diskrad - d, 0.);

                float r = sqrt(xz2);
                float n = swirl(pos, r);

                return density * mask * DENSITY_SCALE * 2. * max(0., n);
            }

            #define N 300
            #define MaxD 10.

            struct RayResult {
                vec3 dir;
                float tau;
                vec3 L;
                int hit;
            };

            RayResult ray (vec3 ro, vec3 rd){
                float stepS = MaxD/float(N);

                vec3 dir = rd;
                vec3 pos = ro;

                float tau = 0.;
                vec3 L = vec3(0.);
                int hit = 0;

                float rad2 = rad * rad;
                float diskBound2 = diskrad * diskrad * 4.0;

                // Main Core Loop computation
                for(int i=0;i<N;i++){

                    float dist2 = dot(pos,pos);
                    float invR = inversesqrt(dist2 + 1e-6);
                    float invR3 = invR * invR * invR;

                    vec3 acc = -pos * (G * invR3)
                            + cross(up, pos) * (Spin * invR3);

                    dir += acc * stepS;

                    if(i % 3 == 0){
                        dir *= inversesqrt(dot(dir,dir));
                    }

                    pos += dir * stepS;

                    if (dist2 <= rad2) { hit = 1; break; }

                    if(dist2 < diskBound2){
                        float d = dens(pos);

                        if (d > 0.){
                            float dist = dist2 * invR;

                            float sigma = d * ABSORPTION_SCALE;
                            float T = exp(-tau);

                            float emission = EMISSION_STRENGTH * d * exp(-EMISSION_FALLOFF*(dist-rad));

                            L += T * emission * stepS;
                            tau += sigma * stepS;

                            if (tau > 5.) break;
                        }
                    }
                }

                RayResult r;
                r.dir = dir;
                r.tau = tau;
                r.L = L;
                r.hit = hit;
                return r;
            }

            vec3 render (vec3 ro, vec3 rd){

                RayResult r = ray(ro, rd);

                vec3 col = vec3(0.);

                if (r.hit == 0){
                    col += texture(iChannel0, r.dir).xyz/2.;
                    float s = voronoi(r.dir*100.);
                    col += exp(-s*50.)*noise31(r.dir*3.);
                }

                col *= exp(-r.tau);

                vec3 lcol = mix(vec3(1,.27,0), vec3(1.), .5) * DISK_BRIGHTNESS;

                return col + r.L * lcol;
            }

            void mainImage( out vec4 fragColor, in vec2 fragCoord )
            {
                if( fragCoord.x > iResolution.x*ResScale || fragCoord.y > iResolution.y*ResScale) 
                    {fragColor = vec4(0); return;}
                
                fragCoord /= ResScale;
                vec2 uv = ( fragCoord-.5*iResolution.xy )/iResolution.y;
                
                float t = iTime/4.;
                vec3 ro = 3.*vec3(sin(t),.1,cos(t));
                ro = ro * 1.5;

                vec3 rd = normalize(-ro);
                ro += vec3(.5);

                vec3 rRight = normalize(cross(vec3(0,1,0), rd));
                
                rd += uv.x * rRight/Zoom;
                rd += uv.y * -cross(rRight,rd)/Zoom;
                rd = normalize(rd);
                
                vec3 col = render(ro,rd);
                
                fragColor = vec4(col,1);
            }
        `;

        const IMAGE_TAB_GLSL = `
            void mainImage( out vec4 fragColor, in vec2 fragCoord )
            {
                vec2 uv = fragCoord/iResolution.xy;
                fragColor = texture(iChannel0, uv*ResScale);
            }
        `;


        // ==========================================
        // 2. SHADERTOY INJECTION WRAPPERS for WebGL2
        // ==========================================
        
        // STANDARD VERTEX SHADER FOR ORTHO PLANES
        const VERTEX_SHADER = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = vec4(position, 1.0);
            }
        `;

        // The GLSL prefix standard mapping wrapper
        const constructFragmentWrapper = (coreLogic, isCubemap) => `
            uniform vec3 iResolution;
            uniform float iTime;
            uniform float iTimeDelta;
            uniform int iFrame;
            uniform vec4 iMouse;
            
            // Critical Binding: Buffer A asks for vector3 Cubemap read for Space background.  Image Tab asks for sampler2D BufferA Frame 
            ${isCubemap ? "uniform samplerCube iChannel0;" : "uniform sampler2D iChannel0;"}

            ${COMMON_TAB}

            ${coreLogic}

            // Tie Shadertoy mainImage execution hook internally to native ThreeJs WebGL out
            void main() {
                mainImage(gl_FragColor, gl_FragCoord.xy);
            }
        `;


        // ==========================================
        // 3. INTERNAL THREE.JS LIFECYCLE 
        // ==========================================

        let renderer, camera, scene, quad;
        let bufAMaterial, extImgMaterial;

        let rtBufferA;
        let dummyCubeTexture;

        const clock = new THREE.Clock();

        function initializePipeline() {

            // Initiate Renderer configured efficiently
            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Construct 2D Stage Plane and Ortho alignment for purely flat frag projecting
            camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
            scene = new THREE.Scene();
            const geometry = new THREE.PlaneGeometry(2, 2);

            // Shadertoy uniform schema initialization mapping parameters natively 
            const globalU = {
                iResolution: { value: new THREE.Vector3(window.innerWidth, window.innerHeight, 1.0) },
                iTime: { value: 0.0 },
                iTimeDelta: { value: 0.0 },
                iFrame: { value: 0 },
                iMouse: { value: new THREE.Vector4(0, 0, 0, 0) },
                iChannel0: { value: null } // Handed on explicit runtime allocation overrides 
            };

            // Initialize Dummy Cubemap (The original GLSL code uses sampleCube on empty Sky to tint color)  
            // Required internally; else THREE.JS flags 'texture calls mismatched variables' compiling.
            const cv_trgt = new THREE.WebGLCubeRenderTarget(2);
            dummyCubeTexture = cv_trgt.texture;

            // Generate Render Target to harbor outputs created uniquely for BufferA Frame caching loops
            rtBufferA = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight, {
                minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter,
                format: THREE.RGBAFormat, type: THREE.FloatType, // Max precision 
                depthBuffer: false, stencilBuffer: false
            });

            // Map Shader Material Instantiates (Force processing explicitly as WebGL2 / GLSL 3!) 
            bufAMaterial = new THREE.ShaderMaterial({
                vertexShader: VERTEX_SHADER,
                fragmentShader: constructFragmentWrapper(BUFFER_A_GLSL, true), // True parameter implements empty sky Cubemap
                uniforms: {...globalU}, // Copy global instances to allow strict separated bindings 
                glslVersion: THREE.GLSL3 
            });

            extImgMaterial = new THREE.ShaderMaterial({
                vertexShader: VERTEX_SHADER,
                fragmentShader: constructFragmentWrapper(IMAGE_TAB_GLSL, false),// False = implement read raw Output Buffer Frame 
                uniforms: {...globalU}, 
                glslVersion: THREE.GLSL3 
            });

            bufAMaterial.uniforms.iChannel0.value = dummyCubeTexture;

            // Anchor materials directly into pipeline 
            quad = new THREE.Mesh(geometry, bufAMaterial);
            scene.add(quad);

            // Interface Control bindings
            window.addEventListener('resize', performSizingOps, false);
            setupInputRays(renderer.domElement, bufAMaterial.uniforms.iMouse, extImgMaterial.uniforms.iMouse);
        }

        // Window resize hooks processing properly mapped resolution 
        function performSizingOps() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            renderer.setSize(w, h);
            rtBufferA.setSize(w, h);
            
            // Overruling sizes internally 
            bufAMaterial.uniforms.iResolution.value.set(w, h, 1.0);
            extImgMaterial.uniforms.iResolution.value.set(w, h, 1.0);
        }
        
        // Mouse Coordinate tracking 
        function setupInputRays(elTgt, t_Uniform1, t_Uniform2){
             let ms_activeMode = false;
             window.addEventListener('mousemove', (e) => {
                const rect = elTgt.getBoundingClientRect(); 
                t_Uniform1.value.x = t_Uniform2.value.x = e.clientX - rect.left;
                t_Uniform1.value.y = t_Uniform2.value.y = rect.height - (e.clientY - rect.top); // FLIPS Native GLSL offset naturally
             });
             window.addEventListener('mousedown', () => { 
                 ms_activeMode = true;  
                 t_Uniform1.value.z = t_Uniform2.value.z = 1.0; 
             });
             window.addEventListener('mouseup', () => { 
                ms_activeMode = false;  
                t_Uniform1.value.z = t_Uniform2.value.z = 0.0;
                t_Uniform1.value.w = t_Uniform2.value.w = 0.0;
             });
        }


        // ==========================================
        // 4. ANIMATION & SYSTEM LOOP DEPOSIT
        // ==========================================

        function beginRenderCycle() {
            requestAnimationFrame(beginRenderCycle);

            const tsDelta = clock.getDelta();
            const tsTimeElapsed = clock.getElapsedTime();
            const countFrm = bufAMaterial.uniforms.iFrame.value + 1;

            // -- 1. PROCESS PASS A --
            bufAMaterial.uniforms.iTime.value = tsTimeElapsed;
            bufAMaterial.uniforms.iTimeDelta.value = tsDelta;
            bufAMaterial.uniforms.iFrame.value = countFrm;

            quad.material = bufAMaterial;
            renderer.setRenderTarget(rtBufferA); // Store raymarch computations memory 
            renderer.render(scene, camera);


            // -- 2. PROCESS DISPLAY PASS --
            extImgMaterial.uniforms.iTime.value = tsTimeElapsed;
            extImgMaterial.uniforms.iTimeDelta.value = tsDelta;
            extImgMaterial.uniforms.iFrame.value = countFrm;
            
            // Map output rendering as Texture 2D explicit 
            extImgMaterial.uniforms.iChannel0.value = rtBufferA.texture; 
            
            quad.material = extImgMaterial;
            renderer.setRenderTarget(null); // Return focus explicitly pushing out view to end native screen target limits actively seamlessly successfully reliably 
            renderer.render(scene, camera);
        }

        // Engage App
        initializePipeline();
        beginRenderCycle();

    </script>
</body>
</html>
